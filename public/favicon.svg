<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#3046e3" stroke="#262f3b" stroke-width="3"/>
  <!-- Space invader body -->
  <g fill="#f3f6ff">
    <!-- Top row -->
    <rect x="20" y="12" width="6" height="6" rx="1"/>
    <rect x="38" y="12" width="6" height="6" rx="1"/>
    <!-- Second row -->
    <rect x="14" y="18" width="36" height="6" rx="1"/>
    <!-- Third row (with eyes) -->
    <rect x="11" y="24" width="42" height="6" rx="1"/>
    <!-- Eyes (red) -->
  </g>
  <g fill="#ba0209">
    <rect x="18" y="24" width="8" height="6" rx="1"/>
    <rect x="38" y="24" width="8" height="6" rx="1"/>
  </g>
  <g fill="#f3f6ff">
    <!-- Body -->
    <rect x="11" y="30" width="42" height="6" rx="1"/>
    <rect x="11" y="36" width="42" height="6" rx="1"/>
    <!-- Bottom row -->
    <rect x="14" y="42" width="10" height="6" rx="1"/>
    <rect x="27" y="42" width="10" height="6" rx="1"/>
    <rect x="40" y="42" width="10" height="6" rx="1"/>
    <!-- Feet -->
    <rect x="11" y="48" width="8" height="5" rx="1"/>
    <rect x="28" y="48" width="8" height="5" rx="1"/>
    <rect x="45" y="48" width="8" height="5" rx="1"/>
  </g>
</svg>